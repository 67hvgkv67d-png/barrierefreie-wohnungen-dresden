name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4
      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Abhängigkeiten installieren
        run: npm ci
      - name: Webseite bauen
        run: npm run build
      - name: Pages vorbereiten
        uses: actions/configure-pages@v5
      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
