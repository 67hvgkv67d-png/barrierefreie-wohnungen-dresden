name: Einmalige Quellenprüfung

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pruefen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Konfiguration prüfen
        run: node scripts/pruefe-quellen.mjs --dry-run --output=reports/quellen-pruefung-dry-run.json

      - name: Öffentliche Quellenseiten einmalig prüfen
        run: node scripts/pruefe-quellen.mjs --output=reports/quellen-pruefung.json

      - name: Prüfbericht als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: quellen-pruefung
          path: reports/*.json
          if-no-files-found: error
          retention-days: 14
